name: Pipeline Basico CI-CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  pruebas:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener codigo del repositorio
        uses: actions/checkout@v4
  
      - name: Configurar Python
        uses: actions/setup-python@v5      
        with:
          python-version: '3.11'
          # Optimización: Habilita el caché para pip
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Aseguramos que pytest esté presente si no viene en requirements
          pip install pytest 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
  
      - name: Ejecutar pruebas
        run: |
          # Indicamos el archivo específico para que no use el autodiscovery
          python -m pytest test.py
 
  entrega:
    runs-on: ubuntu-latest
    needs: pruebas
    # Solo se ejecuta si las pruebas pasaron Y estamos en la rama main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Generar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: proyecto-validado
          # Sugerencia: Sube solo lo necesario (ej. excluir .git)
          path: |
            .
            !.git
            !.github